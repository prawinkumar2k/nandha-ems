<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Content Security Policy: Strict -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'; font-src 'self' data:; connect-src 'none';">
  <title>NEC EMS Enterprise Exam Client</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 2rem 4rem;
      border-radius: 1rem;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #message {
      font-size: 1.25rem;
      font-weight: 500;
    }
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="logo-container" style="width: 300px; height: 100px; margin-bottom: 2rem;">
    <img src="./logo.png" alt="Nandha Engineering College Logo" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));" />
  </div>

  <div class="status-box">
    <div class="spinner"></div>
    <div id="message">Initializing Secure Runtime...</div>
  </div>

  <div class="footer">
    Developed by Prawinkumar N
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
