version: '3.8'

services:
  # Load Balancer & Static Asset Server
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_assets:/var/www/neclms/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - neclms-api

  # Core Backend API
  neclms-api:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=8080
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/neclms}
      - JWT_SECRET=${JWT_SECRET:-neclms_super_secure_production_jwt_fallback_key_123}
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - JUDGE0_URL=http://judge0-server:2358
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - mongo
    volumes:
      - frontend_assets:/app/dist/spa

  # Socket.io Backplane & Cache
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Database
  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ─── Judge0 Compiler Services ────────────────────────
  judge0-server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    depends_on:
      - judge0-db
      - redis

  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - judge0-db
      - redis

  judge0-db:
    image: postgres:13.0
    environment:
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0_secure_pass
      - POSTGRES_DB=judge0
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: always

volumes:
  redis_data:
  mongo_data:
  postgres_data:
  frontend_assets:
