name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Deploy via SSH (password auth)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "📂 Navigating to project directory..."
            cd /root/nandha-ems

            echo "⬇️  Pulling latest code from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐳 Building Docker image (with cache)..."
            docker compose build neclms-api

            echo "🔓 Free conflicting ports from other projects..."
            docker ps --filter "publish=8080" -q | xargs -r docker stop 2>/dev/null || true

            echo "♻️  Restarting API container only..."
            docker compose up -d --no-deps --force-recreate neclms-api

            echo "🌱 Seeding database (skips if data exists)..."
            sleep 5
            docker compose exec -T neclms-api node server/seed.js 2>/dev/null || true

            echo "🧹 Pruning old images..."
            docker image prune -f

            echo "✅ Done! Deployed in record time 🚀"
