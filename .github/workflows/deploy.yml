name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Deploy via SSH (password auth)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "📂 Navigating to project directory..."
            cd /root/nandha-ems

            echo "⬇️  Pulling latest code from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐳 Rebuilding Docker images..."
            docker compose build --no-cache neclms-api

            echo "⏹️  Stopping old containers..."
            docker compose down

            echo "🔓 Freeing up conflicting ports from other projects..."
            docker ps --filter "publish=6379" -q | xargs -r docker stop || true
            docker ps --filter "publish=27017" -q | xargs -r docker stop || true
            docker ps --filter "publish=5432" -q | xargs -r docker stop || true
            docker ps --filter "publish=2358" -q | xargs -r docker stop || true

            echo "♻️  Starting updated containers..."
            docker compose up -d --remove-orphans

            echo "🧹 Cleaning up unused Docker images..."
            docker image prune -f

            echo "✅ Deployment complete! Site is live."
