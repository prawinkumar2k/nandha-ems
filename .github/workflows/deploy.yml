name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Deploy via SSH (password auth)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /root/nandha-ems
            git fetch origin main
            git reset --hard origin/main
            docker compose build neclms-api
            docker ps --filter "publish=8080" -q | xargs -r docker stop 2>/dev/null || true
            docker compose up -d --no-deps --force-recreate neclms-api
            sleep 5
            docker compose exec -T neclms-api node server/seed.js 2>/dev/null || true
            docker image prune -f
            echo "✅ Done!"

  build-exe:
    name: 🖥️ Build & Release Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install pnpm
        run: npm install -g pnpm

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔨 Build portable EXE
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm run build:exe

      - name: 🚀 Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: secure-browser-latest
          name: NEC EMS Secure Browser
          body: |
            Download and run the EXE to launch the secure exam browser.
            No installation needed — just double-click and login.
          files: |
            release/NEC EMS Secure Browser 1.0.0.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
