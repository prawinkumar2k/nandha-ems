name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Deploy via SSH (password auth)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "📂 Navigating to project directory..."
            cd /root/nandha-ems

            echo "⬇️  Pulling latest code from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐳 Building Docker image (with cache)..."
            docker compose build neclms-api

            echo "🔓 Free conflicting ports from other projects..."
            docker ps --filter "publish=8080" -q | xargs -r docker stop 2>/dev/null || true

            echo "♻️  Restarting API container only..."
            docker compose up -d --no-deps --force-recreate neclms-api

            echo "🌱 Seeding database (skips if data exists)..."
            sleep 5
            docker compose exec -T neclms-api node server/seed.js 2>/dev/null || true

            echo "🧹 Pruning old images..."
            docker image prune -f

            echo "✅ Done! Deployed in record time 🚀"

  build-exe:
    name: 🖥️ Build Windows Secure Browser
    runs-on: windows-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install pnpm
        run: npm install -g pnpm

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔨 Build portable EXE (no code signing)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm run build:exe

      - name: 🏷️ Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: secure-browser-latest
          name: NEC EMS Secure Browser
          body: |
            ## NEC EMS Secure Browser
            Download and run the installer to launch the secure exam environment.
            **Steps:**
            1. Download `NEC.EMS.Secure.Browser.exe` below
            2. Run it directly — no installation needed
            3. Login with your student credentials
          files: release/NEC EMS Secure Browser 1.0.0.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
